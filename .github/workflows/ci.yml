name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rfid_saas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: npm --prefix backend ci

      - name: Frontend security audit
        run: npm audit --audit-level=moderate

      - name: Backend security audit
        run: npm --prefix backend audit --audit-level=moderate

      - name: Backend typecheck/build
        run: |
          npm --prefix backend run prisma:generate
          npm --prefix backend run build

      - name: Frontend build
        run: npm run build

      - name: Run backend migrations
        run: npm --prefix backend exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rfid_saas?schema=public

      - name: Backend e2e tests
        run: npm --prefix backend run test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rfid_saas?schema=public
          JWT_ACCESS_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          TWO_FACTOR_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          DASHBOARD_REDIRECT_URL: http://localhost:5173/dashboard/overview
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          GOOGLE_CLIENT_ID: ci.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: ci-secret
          GOOGLE_CALLBACK_URL: http://localhost:4012/auth/google/callback
          MAGIC_LINK_CALLBACK_URL: http://localhost:5173/auth/magic-link/callback
          EMAIL_PROVIDER: console
          EMAIL_FROM: no-reply@rfid-ci.local
